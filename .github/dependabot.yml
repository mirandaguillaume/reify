version: 2
updates:
  # Go modules — grouped so a single PR bumps related deps together.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns:
          - "*"
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies
      - go

  # GitHub Actions used in .github/workflows — keep them current to ride
  # Node-runtime deprecations (e.g. Node 20 → 24 in 2026) without manual chasing.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      gh-actions:
        patterns:
          - "*"
    commit-message:
      prefix: chore(ci)
      include: scope
    labels:
      - dependencies
      - github-actions
