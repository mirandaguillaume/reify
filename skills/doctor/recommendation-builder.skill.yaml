skill: recommendation-builder
version: "1.0.0"
context:
  consumes: [analysis_results, context_recommendations]
  produces: [recommendations]
  memory: short-term
strategy:
  approach: code
  tools: []
  effort: light
  steps:
    - merge analysis_results with context_recommendations into a unified finding set
    - sort findings by severity and category
    - format findings as a structured recommendations list for CLI output
guardrails:
  - timeout: 5s
  - max_findings: 100
observability:
  trace_level: standard
  metrics: [tokens, recommendation_count]
security:
  filesystem: none
  network: none
negotiation:
  file_conflicts: yield
  priority: 1
when_to_use:
  triggers:
    - as the final aggregation step in the doctor pipeline
  dont_use:
    - in isolation without upstream analysis_results and context_recommendations
